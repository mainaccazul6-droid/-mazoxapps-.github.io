<!DOCTYPE html>
<html>
<head>
  <title>MAZO-X APPS</title>

  <style>
    body {
      font-family: Arial;
      background: #0f0f0f;
      color: white;
      text-align: center;
      margin: 0;
      padding: 0;
    }

    h1 {
      margin-top: 20px;
      color: #00ff99;
    }

    .store {
      padding: 20px;
    }

    .app {
      background: #1e1e1e;
      margin: 15px auto;
      padding: 15px;
      width: 80%;
      max-width: 400px;
      border-radius: 12px;
      box-shadow: 0 0 10px rgba(0,255,153,0.3);
    }

    .app h2 {
      margin: 0;
      color: #00ff99;
    }

    .app p {
      font-size: 14px;
      color: #ccc;
    }

    .btn {
      display: inline-block;
      margin-top: 10px;
      padding: 10px 15px;
      background: #00ff99;
      color: black;
      text-decoration: none;
      border-radius: 8px;
      font-weight: bold;
    }

    .btn:hover {
      background: #00cc77;
    }

    .rating {
      margin-top: 5px;
      color: gold;
      font-size: 14px;
    }

    input {
      padding:10px;
      width:80%;
      max-width:400px;
      margin-top:20px;
      border-radius:8px;
      border:none;
    }
  </style>
</head>

<body>

  <h1>MAZO-X APPS</h1>
  <p>Download apps for MAZO-X OS</p>

  <!-- 🔍 BUSCADOR -->
  <input 
    type="text" 
    id="search" 
    placeholder="🔍 Search apps..."
    onkeyup="buscarApps()"
  >

  <!-- 📦 STORE DINÁMICO -->
  <div class="store" id="store"></div>

  <!-- 🔄 CARGA AUTOMÁTICA DE APPS -->
  <script>
    fetch("apps.json")
      .then(res => res.json())
      .then(data => {
        let store = document.getElementById("store");

        data.forEach(app => {
          store.innerHTML += `
            <div class="app">
              <h2>${app.name}</h2>
              <p>${app.desc}</p>
              <div class="rating">★ ${app.rating}</div>
              <a class="btn" href="apps/notes.mazoxpkg" onclick="installApp('apps/notes.mazoxpkg', 'Notes App')">
  Install
</a>
            </div>
          `;
        });
      });

    function buscarApps() {
      let input = document.getElementById("search").value.toLowerCase();
      let apps = document.getElementsByClassName("app");

      for (let i = 0; i < apps.length; i++) {
        let title = apps[i].getElementsByTagName("h2")[0].innerText.toLowerCase();

        if (title.includes(input)) {
          apps[i].style.display = "";
        } else {
          apps[i].style.display = "none";
        }
      }
    }
  </script>

<script>
function installApp(file, name) {

  alert("Installing " + name + "...");

  // Simulación de instalación
  setTimeout(() => {
    alert("✔ " + name + " installed successfully in MAZO-X!");
  }, 1500);
}
</script>
</body>
</html>
