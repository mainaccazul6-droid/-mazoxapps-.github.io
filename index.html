<!DOCTYPE html>
<html>
<head>
  <title>MAZO-X APPS</title>

  <style>
    body {
      font-family: Arial;
      background: #0f0f0f;
      color: white;
      text-align: center;
      margin: 0;
      padding: 0;
    }

    h1 {
      margin-top: 20px;
      color: #00ff99;
    }

    .store {
      padding: 20px;
    }

    .app {
      background: #1e1e1e;
      margin: 15px auto;
      padding: 15px;
      width: 80%;
      max-width: 400px;
      border-radius: 12px;
      box-shadow: 0 0 10px rgba(0,255,153,0.3);
    }

    .app h2 {
      margin: 0;
      color: #00ff99;
    }

    .app p {
      font-size: 14px;
      color: #ccc;
    }

    .btn {
      display: inline-block;
      margin-top: 10px;
      padding: 10px 15px;
      background: #00ff99;
      color: black;
      text-decoration: none;
      border-radius: 8px;
      font-weight: bold;
    }

    .btn:hover {
      background: #00cc77;
    }
  </style>
</head>

<body>

  <h1>MAZO-X APPS</h1>
  <p>Download apps for MAZO-X OS</p>

  <input 
  type="text" 
  id="search" 
  placeholder="🔍 Search apps..."
  onkeyup="buscarApps()"
  style="
    padding:10px;
    width:80%;
    max-width:400px;
    margin-top:20px;
    border-radius:8px;
    border:none;
"
>
  <div class="store">

    <!-- APP 1 -->
    <div class="app">
      <h2>Notes App</h2>
      <p>Simple notes application for MAZO-X</p>
      <a class="btn" href="apps/notes.mazoxpkg">Download</a>
    </div>

    <!-- APP 2 -->
    <div class="app">
      <h2>Calculator</h2>
      <p>Basic math calculator for MAZO-X</p>
      <a class="btn" href="apps/calc.mazoxpkg">Download</a>
    </div>

    <!-- APP 3 -->
    <div class="app">
      <h2>Game Demo</h2>
      <p>Mini game for MAZO-X system</p>
      <a class="btn" href="apps/game.mazoxpkg">Download</a>
    </div>

  </div>

<script>
function buscarApps() {
  let input = document.getElementById("search").value.toLowerCase();
  let apps = document.getElementsByClassName("app");

  for (let i = 0; i < apps.length; i++) {
    let title = apps[i].getElementsByTagName("h2")[0].innerText.toLowerCase();

    if (title.includes(input)) {
      apps[i].style.display = "block";
    } else {
      apps[i].style.display = "none";
    }
  }
}
      </script>
</body>
</html>
